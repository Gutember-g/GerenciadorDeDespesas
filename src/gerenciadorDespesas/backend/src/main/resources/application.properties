spring.application.name=gerenciadordespesas

# H2 In-Memory Database Configuration for development
spring.datasource.url=jdbc:h2:mem:gerenciador_despesas;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Port Settings
server.port=8080

# JWT Secret
jwt.secret=${JWT_SECRET:minha-chave-secreta-muito-longa-e-aleatoria-para-o-projeto-gerenciador-de-despesas}

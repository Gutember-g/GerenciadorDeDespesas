spring.application.name=gerenciadordespesas

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/gerenciador_despesas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Port Settings
server.port=8080

# JWT Secret
jwt.secret=minha-chave-secreta-muito-longa-e-aleatoria-para-o-projeto-gerenciador-de-despesas
